name: Pipeline de Pruebas

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - '*'

jobs:
  ejecutar-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 1 · Checkout del código
        uses: actions/checkout@v4

      # 👇 EJEMPLOS según tu proyecto (elige el tuyo)
      
      # Si usas Node.js
      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test